<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Almide WebGL</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0f; }
    canvas { border-radius: 8px; box-shadow: 0 4px 32px rgba(0,0,0,0.6); }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="600"></canvas>
  <script src="webgl.js"></script>
  <script>
    AlmideWebGL.load("app.wasm", "canvas")
      .catch(e => console.error("Failed to load:", e));
  </script>
</body>
</html>
