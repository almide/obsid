<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>obsid — Almide 3D rendering foundation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overscroll-behavior: none; touch-action: none; }
    body { overflow: hidden; background: #020104; font-family: -apple-system, system-ui, sans-serif; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

    #ui {
      position: fixed; top: 12px; left: 12px; right: 12px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; gap: 12px;
    }
    #left-stack {
      display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
    }
    .pill-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      padding: 6px; border-radius: 8px; pointer-events: auto;
    }
    .pill-row button {
      background: transparent; color: #ccc; border: 1px solid transparent;
      font: 13px/1 monospace; padding: 8px 12px; border-radius: 4px;
      cursor: pointer; transition: all 0.15s;
    }
    .pill-row button:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .pill-row button.active {
      color: #fff; background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }
    .pill-label {
      color: #666; font: 10px/1 monospace; padding: 0 4px;
      align-self: center; letter-spacing: 0.05em; text-transform: uppercase;
    }
    #stats {
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      color: #ccc; font: 13px/1.5 monospace;
      padding: 8px 12px; border-radius: 8px; pointer-events: none;
      white-space: nowrap;
    }
    #title {
      position: fixed; bottom: 12px; left: 12px; right: 12px;
      display: flex; justify-content: space-between;
      color: #888; font: 11px/1.4 monospace; pointer-events: none;
    }
    #title a { color: #aaa; text-decoration: none; pointer-events: auto; }
    #title a:hover { color: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="left-stack">
      <div id="picker" class="pill-row"></div>
      <div id="quality" class="pill-row"></div>
    </div>
    <div id="stats">— fps</div>
  </div>

  <div id="title">
    <span>obsid — Almide 3D rendering foundation</span>
    <a href="https://github.com/almide/obsid" target="_blank">github.com/almide/obsid</a>
  </div>

  <script src="obsid-gl.js"></script>
  <script src="obsid.js"></script>
  <script>
    const EXAMPLES = [
      { id: "heightmap", label: "Heightmap" },
      { id: "triangle",  label: "Triangle"  },
      { id: "sphere",    label: "Sphere"    },
      { id: "torus",     label: "Torus"     },
      { id: "checker",   label: "Checker"   },
    ];

    const params = new URL(location).searchParams;
    const current = EXAMPLES.find(e => e.id === params.get("ex")) || EXAMPLES[0];
    const currentQuality = Obsid.getQuality(params.get("q"));

    // Helper: swap a query param and navigate (same pattern the example
    // picker already uses — full reload so context/shaders rebuild cleanly).
    function navigateWithParam(key, value) {
      const url = new URL(location);
      url.searchParams.set(key, value);
      location.href = url.toString();
    }

    // Build example picker
    const picker = document.getElementById("picker");
    for (const ex of EXAMPLES) {
      const b = document.createElement("button");
      b.textContent = ex.label;
      if (ex.id === current.id) b.classList.add("active");
      b.addEventListener("click", () => {
        if (ex.id !== current.id) navigateWithParam("ex", ex.id);
      });
      picker.appendChild(b);
    }

    // Build quality picker
    const qualityBar = document.getElementById("quality");
    const qLabel = document.createElement("span");
    qLabel.textContent = "Quality";
    qLabel.className = "pill-label";
    qualityBar.appendChild(qLabel);
    for (const q of Obsid.QUALITIES) {
      const b = document.createElement("button");
      b.textContent = q.label;
      if (q.id === currentQuality.id) b.classList.add("active");
      b.addEventListener("click", () => {
        if (q.id !== currentQuality.id) navigateWithParam("q", q.id);
      });
      qualityBar.appendChild(b);
    }

    // Canvas sizing (DPR comes from the chosen quality preset)
    const c = document.getElementById("canvas");
    const dpr = Obsid.dprFor(currentQuality);
    c.width = window.innerWidth * dpr;
    c.height = window.innerHeight * dpr;

    // FPS counter
    const statsEl = document.getElementById("stats");
    let frames = 0, lastTime = performance.now();
    function updateStats() {
      const now = performance.now();
      frames++;
      if (now - lastTime >= 500) {
        const fps = (frames * 1000 / (now - lastTime)).toFixed(1);
        const ms = ((now - lastTime) / frames).toFixed(2);
        statsEl.textContent = `${fps} fps · ${ms} ms`;
        frames = 0;
        lastTime = now;
      }
      requestAnimationFrame(updateStats);
    }
    requestAnimationFrame(updateStats);

    // Load WASM (resize is handled inside obsid.js via on_resize forwarding)
    Obsid.load(`examples/${current.id}.wasm`, "canvas", currentQuality.id)
      .catch(e => console.error("Failed:", e));
  </script>
</body>
</html>
